<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.35" numOctaves="4" seed="3" result="noise"/>
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.30
        0 0 0 0 0.18
        0 0 0 0 0.08
        0 0 0 0.15 0" in="noise" result="color"/>
      <feBlend in="color" in2="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="#6b4a28"/>
  <rect width="600" height="600" filter="url(#grain)" opacity="0.7"/>
  <rect width="600" height="600" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="120"/>
</svg>
